services:
  - type: web
    name: daal-backend-staging
    env: node
    rootDir: auth-backend
    healthCheckPath: /health
    buildCommand: npm install && npm run prisma:generate && npm run build
    startCommand: npm run start
    disk:
      name: uploads
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - key: PORT
        value: "5001"
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES_IN
        value: "15m"
      - key: JWT_REFRESH_EXPIRES_IN
        value: "7d"
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        value: "6379"
      - key: REDIS_PASSWORD
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: UPLOADS_DIR
        value: "/var/data/uploads"
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: MAX_LOGIN_ATTEMPTS
        value: "5"
      - key: LOCK_TIME_MINUTES
        value: "15"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false

# Fill the synced values from the Render Dashboard for each environment.
# Do not place real secrets in this file.
# Uploaded files are stored on the Render disk mounted at /var/data.
